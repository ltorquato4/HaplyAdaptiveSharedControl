name: Pre-commit Checks

on:
  push:
  pull_request:

jobs:
  pre-commit-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build image
        run: |
          docker build \
            -f ./docker/Dockerfile \
            -t research-seminar:humble \
            .

      - name: Get changed files
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            BASE="${{ github.event.before }}"
          else
            BASE="$(git rev-list --max-parents=0 HEAD)"
          fi

          if ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "Base commit $BASE is not available; falling back to merge-base with origin/main."
            git fetch --no-tags origin main
            BASE="$(git merge-base HEAD origin/main)"
          fi

          FILES="$(git diff --name-only "$BASE" HEAD | tr '\n' ' ')"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run pre-commit checks
        shell: bash
        run: |
          FILES="${{ steps.changes.outputs.files }}"
          echo "Changed files: $FILES"

          if [[ -z "${FILES// }" ]]; then
            echo "No changed files to check."
            exit 0
          fi

          docker run --rm \
            -v "${{ github.workspace }}":/workspaces/research-seminar \
            -w /workspaces/research-seminar \
            --entrypoint bash \
            research-seminar:humble \
            -lc "git config --global --add safe.directory /workspaces/research-seminar && SKIP=no-commit-to-branch pre-commit run --files $FILES"
